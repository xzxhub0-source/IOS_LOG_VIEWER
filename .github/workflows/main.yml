name: Build XZX Log Viewer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: Create Swift Package
        run: |
          mkdir -p XZX-LogViewer/Sources/XZXLogViewer/Views
          mkdir -p XZX-LogViewer/Sources/XZXLogViewer/Managers
          
          cat > XZX-LogViewer/Package.swift << 'EOF'
          // swift-tools-version:5.5
          import PackageDescription

          let package = Package(
              name: "XZXLogViewer",
              platforms: [
                  .iOS(.v15)
              ],
              products: [
                  .executable(name: "XZXLogViewer", targets: ["XZXLogViewer"])
              ],
              targets: [
                  .executableTarget(
                      name: "XZXLogViewer",
                      dependencies: [],
                      path: "Sources"
                  )
              ]
          )
          EOF

      - name: Create App.swift
        run: |
          cat > XZX-LogViewer/Sources/XZXLogViewer/main.swift << 'EOF'
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = UINavigationController(rootViewController: LogConsoleViewController())
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

      - name: Create LogManager.swift
        run: |
          cat > XZX-LogViewer/Sources/XZXLogViewer/Managers/LogManager.swift << 'EOF'
          import Foundation
          import UIKit

          struct LogEntry: Identifiable {
              let id = UUID()
              let timestamp: Date
              let message: String
              let level: LogLevel
              let source: String
              
              enum LogLevel: String {
                  case info = "INFO"
                  case warning = "WARNING"
                  case error = "ERROR"
                  case debug = "DEBUG"
                  
                  var color: UIColor {
                      switch self {
                      case .info: return .systemBlue
                      case .warning: return .systemOrange
                      case .error: return .systemRed
                      case .debug: return .systemGreen
                      }
                  }
              }
          }

          class LogManager: ObservableObject {
              static let shared = LogManager()
              
              @Published var logs: [LogEntry] = []
              @Published var isMonitoring = false
              @Published var searchText = ""
              @Published var selectedLevels: Set<LogEntry.LogLevel> = [.info, .warning, .error, .debug]
              
              private var timer: Timer?
              
              private init() {}
              
              func startMonitoring() {
                  isMonitoring = true
                  timer = Timer.scheduledTimer(withTimeInterval: 2.0, repeats: true) { [weak self] _ in
                      self?.addMockLog()
                  }
              }
              
              func stopMonitoring() {
                  isMonitoring = false
                  timer?.invalidate()
                  timer = nil
              }
              
              private func addMockLog() {
                  let messages = [
                      "[XZX] Core initialized",
                      "[XZX] Game detected - UI shown",
                      "[XZX] Lua script executed",
                      "[XZX] PlayerList found",
                      "[XZX] placeId = 123456789",
                      "[XZX] Overlay created successfully",
                      "[XZX] Task scheduler hooked"
                  ]
                  
                  let randomMessage = messages.randomElement() ?? "[XZX] Log entry"
                  let levels: [LogEntry.LogLevel] = [.info, .warning, .error, .debug]
                  let randomLevel = levels.randomElement() ?? .info
                  
                  let entry = LogEntry(timestamp: Date(), message: randomMessage, level: randomLevel, source: "Roblox")
                  
                  DispatchQueue.main.async {
                      self.logs.insert(entry, at: 0)
                      if self.logs.count > 500 {
                          self.logs.removeLast()
                      }
                  }
              }
              
              func addLog(_ message: String, level: LogEntry.LogLevel = .info, source: String = "Executor") {
                  let entry = LogEntry(timestamp: Date(), message: message, level: level, source: source)
                  DispatchQueue.main.async {
                      self.logs.insert(entry, at: 0)
                      if self.logs.count > 500 {
                          self.logs.removeLast()
                      }
                  }
              }
              
              func clearLogs() {
                  logs.removeAll()
              }
              
              var filteredLogs: [LogEntry] {
                  logs.filter { log in
                      let matchesLevel = selectedLevels.contains(log.level)
                      let matchesSearch = searchText.isEmpty || log.message.localizedCaseInsensitiveContains(searchText)
                      return matchesLevel && matchesSearch
                  }
              }
          }
          EOF

      - name: Create LogConsoleViewController.swift
        run: |
          cat > XZX-LogViewer/Sources/XZXLogViewer/LogConsoleViewController.swift << 'EOF'
          import UIKit

          class LogConsoleViewController: UIViewController {
              private let tableView = UITableView()
              private let searchBar = UISearchBar()
              private let logManager = LogManager.shared
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  setupUI()
                  setupTableView()
                  setupNavigationBar()
                  logManager.startMonitoring()
              }
              
              private func setupUI() {
                  view.backgroundColor = .systemBackground
                  title = "XZX Log Console"
                  
                  searchBar.placeholder = "Search logs..."
                  searchBar.delegate = self
                  searchBar.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(searchBar)
                  
                  NSLayoutConstraint.activate([
                      searchBar.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
                      searchBar.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      searchBar.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      searchBar.heightAnchor.constraint(equalToConstant: 50)
                  ])
              }
              
              private func setupTableView() {
                  tableView.translatesAutoresizingMaskIntoConstraints = false
                  tableView.register(LogCell.self, forCellReuseIdentifier: "LogCell")
                  tableView.delegate = self
                  tableView.dataSource = self
                  tableView.separatorStyle = .none
                  view.addSubview(tableView)
                  
                  NSLayoutConstraint.activate([
                      tableView.topAnchor.constraint(equalTo: searchBar.bottomAnchor),
                      tableView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      tableView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      tableView.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])
              }
              
              private func setupNavigationBar() {
                  let clearButton = UIBarButtonItem(barButtonSystemItem: .trash, target: self, action: #selector(clearLogs))
                  let filterButton = UIBarButtonItem(image: UIImage(systemName: "line.3.horizontal.decrease.circle"), style: .plain, target: self, action: #selector(showFilter))
                  let monitorButton = UIBarButtonItem(title: "Stop", style: .plain, target: self, action: #selector(toggleMonitoring))
                  navigationItem.rightBarButtonItems = [clearButton, monitorButton, filterButton]
              }
              
              @objc private func clearLogs() {
                  logManager.clearLogs()
                  tableView.reloadData()
              }
              
              @objc private func toggleMonitoring() {
                  if logManager.isMonitoring {
                      logManager.stopMonitoring()
                      navigationItem.rightBarButtonItems?[1].title = "Start"
                  } else {
                      logManager.startMonitoring()
                      navigationItem.rightBarButtonItems?[1].title = "Stop"
                  }
              }
              
              @objc private func showFilter() {
                  let alert = UIAlertController(title: "Filter by Level", message: nil, preferredStyle: .actionSheet)
                  
                  let levels: [(LogEntry.LogLevel, String)] = [
                      (.info, "INFO"), (.warning, "WARNING"), (.error, "ERROR"), (.debug, "DEBUG")
                  ]
                  
                  for (level, name) in levels {
                      let isSelected = logManager.selectedLevels.contains(level)
                      alert.addAction(UIAlertAction(title: "\(isSelected ? "✓ " : "  ") \(name)", style: .default) { _ in
                          if self.logManager.selectedLevels.contains(level) {
                              self.logManager.selectedLevels.remove(level)
                          } else {
                              self.logManager.selectedLevels.insert(level)
                          }
                          self.tableView.reloadData()
                      })
                  }
                  
                  alert.addAction(UIAlertAction(title: "Cancel", style: .cancel))
                  present(alert, animated: true)
              }
          }

          extension LogConsoleViewController: UITableViewDelegate, UITableViewDataSource {
              func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {
                  return logManager.filteredLogs.count
              }
              
              func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {
                  let cell = tableView.dequeueReusableCell(withIdentifier: "LogCell", for: indexPath) as! LogCell
                  let log = logManager.filteredLogs[indexPath.row]
                  cell.configure(with: log)
                  return cell
              }
              
              func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath) {
                  tableView.deselectRow(at: indexPath, animated: true)
                  let log = logManager.filteredLogs[indexPath.row]
                  
                  let alert = UIAlertController(title: "Log Details", message: """
                      Level: \(log.level.rawValue)
                      Time: \(DateFormatter.localizedString(from: log.timestamp, dateStyle: .medium, timeStyle: .medium))
                      Source: \(log.source)
                      
                      Message:
                      \(log.message)
                      """, preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default))
                  present(alert, animated: true)
              }
          }

          extension LogConsoleViewController: UISearchBarDelegate {
              func searchBar(_ searchBar: UISearchBar, textDidChange searchText: String) {
                  logManager.searchText = searchText
                  tableView.reloadData()
              }
              
              func searchBarSearchButtonClicked(_ searchBar: UISearchBar) {
                  searchBar.resignFirstResponder()
              }
          }

          class LogCell: UITableViewCell {
              private let levelIndicator = UIView()
              private let levelLabel = UILabel()
              private let messageLabel = UILabel()
              private let timeLabel = UILabel()
              private let sourceLabel = UILabel()
              
              override init(style: UITableViewCell.CellStyle, reuseIdentifier: String?) {
                  super.init(style: style, reuseIdentifier: reuseIdentifier)
                  setupViews()
              }
              
              required init?(coder: NSCoder) {
                  fatalError("init(coder:) has not been implemented")
              }
              
              private func setupViews() {
                  levelIndicator.translatesAutoresizingMaskIntoConstraints = false
                  levelIndicator.layer.cornerRadius = 4
                  contentView.addSubview(levelIndicator)
                  
                  levelLabel.font = .systemFont(ofSize: 12, weight: .bold)
                  levelLabel.translatesAutoresizingMaskIntoConstraints = false
                  contentView.addSubview(levelLabel)
                  
                  messageLabel.font = .systemFont(ofSize: 14, weight: .regular)
                  messageLabel.numberOfLines = 0
                  messageLabel.translatesAutoresizingMaskIntoConstraints = false
                  contentView.addSubview(messageLabel)
                  
                  timeLabel.font = .systemFont(ofSize: 10)
                  timeLabel.textColor = .secondaryLabel
                  timeLabel.translatesAutoresizingMaskIntoConstraints = false
                  contentView.addSubview(timeLabel)
                  
                  sourceLabel.font = .systemFont(ofSize: 10)
                  sourceLabel.textColor = .secondaryLabel
                  sourceLabel.textAlignment = .right
                  sourceLabel.translatesAutoresizingMaskIntoConstraints = false
                  contentView.addSubview(sourceLabel)
                  
                  NSLayoutConstraint.activate([
                      levelIndicator.leadingAnchor.constraint(equalTo: contentView.leadingAnchor, constant: 12),
                      levelIndicator.centerYAnchor.constraint(equalTo: levelLabel.centerYAnchor),
                      levelIndicator.widthAnchor.constraint(equalToConstant: 8),
                      levelIndicator.heightAnchor.constraint(equalToConstant: 8),
                      
                      levelLabel.leadingAnchor.constraint(equalTo: levelIndicator.trailingAnchor, constant: 8),
                      levelLabel.topAnchor.constraint(equalTo: contentView.topAnchor, constant: 8),
                      
                      timeLabel.trailingAnchor.constraint(equalTo: contentView.trailingAnchor, constant: -12),
                      timeLabel.centerYAnchor.constraint(equalTo: levelLabel.centerYAnchor),
                      
                      sourceLabel.trailingAnchor.constraint(equalTo: timeLabel.leadingAnchor, constant: -8),
                      sourceLabel.centerYAnchor.constraint(equalTo: levelLabel.centerYAnchor),
                      
                      messageLabel.topAnchor.constraint(equalTo: levelLabel.bottomAnchor, constant: 4),
                      messageLabel.leadingAnchor.constraint(equalTo: contentView.leadingAnchor, constant: 12),
                      messageLabel.trailingAnchor.constraint(equalTo: contentView.trailingAnchor, constant: -12),
                      messageLabel.bottomAnchor.constraint(equalTo: contentView.bottomAnchor, constant: -8)
                  ])
              }
              
              func configure(with log: LogEntry) {
                  levelIndicator.backgroundColor = log.level.color
                  levelLabel.text = log.level.rawValue
                  levelLabel.textColor = log.level.color
                  messageLabel.text = log.message
                  
                  let formatter = DateFormatter()
                  formatter.timeStyle = .medium
                  timeLabel.text = formatter.string(from: log.timestamp)
                  sourceLabel.text = log.source
              }
          }
          EOF

      - name: Build iOS app with Swift Package Manager
        run: |
          cd XZX-LogViewer
          swift build -c release --triple arm64-apple-ios15.0

      - name: Create app bundle
        run: |
          mkdir -p Payload/XZXLogViewer.app
          cp -r XZX-LogViewer/.build/release/XZXLogViewer Payload/XZXLogViewer.app/
          
          # Create Info.plist
          cat > Payload/XZXLogViewer.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>XZXLogViewer</string>
              <key>CFBundleIdentifier</key>
              <string>com.xzx.logviewer</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>XZXLogViewer</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          
          cd Payload
          zip -r ../XZXLogViewer.ipa .
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XZX-LogViewer
          path: XZXLogViewer.ipa
          if-no-files-found: error
          retention-days: 90
