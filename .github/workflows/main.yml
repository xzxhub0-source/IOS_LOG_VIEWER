      - name: Create empty Asset Catalog
        run: |
          cat > XZX-LogViewer/Assets.xcassets/Contents.json << 'EOF'
          {
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF
          cat > XZX-LogViewer/Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images" : [
              {
                "idiom" : "iphone",
                "scale" : "2x",
                "size" : "20x20"
              },
              {
                "idiom" : "iphone",
                "scale" : "3x",
                "size" : "20x20"
              },
              {
                "idiom" : "iphone",
                "scale" : "2x",
                "size" : "29x29"
              },
              {
                "idiom" : "iphone",
                "scale" : "3x",
                "size" : "29x29"
              },
              {
                "idiom" : "iphone",
                "scale" : "2x",
                "size" : "40x40"
              },
              {
                "idiom" : "iphone",
                "scale" : "3x",
                "size" : "40x40"
              },
              {
                "idiom" : "iphone",
                "scale" : "2x",
                "size" : "60x60"
              },
              {
                "idiom" : "iphone",
                "scale" : "3x",
                "size" : "60x60"
              }
            ],
            "info" : {
