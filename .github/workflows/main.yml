              "version" : 1
            }
          }
          EOF

      - name: Compile Swift files
        run: |
          mkdir -p build/obj
          find XZX-LogViewer -name "*.swift" -print0 | while IFS= read -r -d '' file; do
            echo "Compiling $file"
            swiftc -c -parse-as-library \
              -target arm64-apple-ios15.0 \
              -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
              -module-name XZX_LogViewer \
              -o "build/obj/$(basename "$file" .swift).o" \
              "$file"
          done

      - name: Link executable
        run: |
          swiftc \
            -target arm64-apple-ios15.0 \
            -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
            -F$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks \
            -framework UIKit -framework SwiftUI -framework Foundation -framework UserNotifications \
            -o build/XZX-LogViewer \
            build/obj/*.o

      - name: Create app bundle
        run: |
          APP_DIR="build/Payload/XZX-LogViewer.app"
          mkdir -p "$APP_DIR"
          cp build/XZX-LogViewer "$APP_DIR/"
          cp XZX-LogViewer/Info.plist "$APP_DIR/"
          cp -r XZX-LogViewer/Assets.xcassets "$APP_DIR/"
          mkdir -p "$APP_DIR/Base.lproj"
          cp XZX-LogViewer/LaunchScreen.storyboard "$APP_DIR/Base.lproj/LaunchScreen.storyboard"
          # Generate a minimal PkgInfo
          echo "APPL????" > "$APP_DIR/PkgInfo"
          # Sign the app (ad‑hoc)
          codesign -f -s - "$APP_DIR"

      - name: Package IPA
        run: |
          cd build
          zip -qr XZX-LogViewer.ipa Payload/
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XZX-LogViewer
