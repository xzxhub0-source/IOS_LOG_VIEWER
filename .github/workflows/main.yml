name: Build XZX Log Viewer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create directory structure
        run: |
          mkdir -p XZX-LogViewer/Managers
          mkdir -p XZX-LogViewer/Views
          mkdir -p XZX-LogViewer/Assets.xcassets/AppIcon.appiconset
          mkdir -p build/Payload

      - name: Create Info.plist
        run: |
          cat > XZX-LogViewer/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>XZX-LogViewer</string>
            <key>CFBundleIdentifier</key>
            <string>com.xzx.logviewer</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>XZX Log Viewer</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>armv7</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
            </array>
            <key>UIApplicationSceneManifest</key>
            <dict>
              <key>UIApplicationSupportsMultipleScenes</key>
              <false/>
              <key>UISceneConfigurations</key>
              <dict>
                <key>UIWindowSceneSessionRoleApplication</key>
                <array>
                  <dict>
                    <key>UISceneConfigurationName</key>
                    <string>Default Configuration</string>
                    <key>UISceneDelegateClassName</key>
                    <string>$(PRODUCT_MODULE_NAME).SceneDelegate</string>
                  </dict>
                </array>
              </dict>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Create AppDelegate.swift
        run: |
          cat > XZX-LogViewer/AppDelegate.swift << 'EOF'
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = UINavigationController(rootViewController: LogConsoleViewController())
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

      - name: Create SceneDelegate.swift
        run: |
          cat > XZX-LogViewer/SceneDelegate.swift << 'EOF'
          import UIKit

          class SceneDelegate: UIResponder, UIWindowSceneDelegate {
              var window: UIWindow?
              
              func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions) {
                  guard let windowScene = (scene as? UIWindowScene) else { return }
                  window = UIWindow(windowScene: windowScene)
                  window?.rootViewController = UINavigationController(rootViewController: LogConsoleViewController())
                  window?.makeKeyAndVisible()
              }
          }
          EOF

      - name: Create LogManager.swift
        run: |
          cat > XZX-LogViewer/Managers/LogManager.swift << 'EOF'
          import Foundation
          import UIKit

          struct LogEntry: Codable, Identifiable {
              let id = UUID()
              let timestamp: Date
              let message: String
              let level: LogLevel
              let source: String
              
              enum LogLevel: String, Codable {
                  case info = "INFO"
                  case warning = "WARNING"
                  case error = "ERROR"
                  case debug = "DEBUG"
                  
                  var color: UIColor {
                      switch self {
                      case .info: return .systemBlue
                      case .warning: return .systemOrange
                      case .error: return .systemRed
                      case .debug: return .systemGreen
                      }
                  }
              }
          }

          class LogManager: ObservableObject {
              static let shared = LogManager()
              
              @Published var logs: [LogEntry] = []
              @Published var isMonitoring = false
              @Published var searchText = ""
              @Published var selectedLevels: Set<LogEntry.LogLevel> = [.info, .warning, .error, .debug]
              
              private var timer: Timer?
              private let logFileURL: URL
              private let maxLogEntries = 1000
              
              private init() {
                  let documentsPath = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask).first!
                  logFileURL = documentsPath.appendingPathComponent("xzx_logs.json")
                  loadLogs()
              }
              
              func startMonitoring() {
                  isMonitoring = true
                  timer = Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { [weak self] _ in
                      self?.readSystemLogs()
                  }
              }
              
              func stopMonitoring() {
                  isMonitoring = false
                  timer?.invalidate()
                  timer = nil
              }
              
              private func readSystemLogs() {
                  let process = Process()
                  let pipe = Pipe()
                  process.executableURL = URL(fileURLWithPath: "/usr/bin/log")
                  process.arguments = ["show", "--predicate", "process == 'Roblox'", "--last", "2s"]
                  process.standardOutput = pipe
                  do {
                      try process.run()
                      process.waitUntilExit()
                      let data = pipe.fileHandleForReading.readDataToEndOfFile()
                      if let output = String(data: data, encoding: .utf8) {
                          parseLogOutput(output)
                      }
                  } catch {
                      print("Failed to read logs: \(error)")
                  }
              }
              
              private func parseLogOutput(_ output: String) {
                  let lines = output.components(separatedBy: .newlines)
                  for line in lines {
                      if line.contains("[XZX]") {
                          addLogEntry(from: line, source: "Roblox")
                      } else if line.contains("XZX") {
                          addLogEntry(from: line, source: "Executor")
                      }
                  }
              }
              
              private func addLogEntry(from line: String, source: String) {
                  var level: LogEntry.LogLevel = .info
                  var message = line
                  if line.contains("ERROR") || line.contains("Error") { level = .error }
                  else if line.contains("WARN") || line.contains("Warning") { level = .warning }
                  else if line.contains("DEBUG") { level = .debug }
                  if let range = line.range(of: "\\[XZX\\]|XZX", options: .regularExpression) {
                      message = String(line[range.upperBound...]).trimmingCharacters(in: .whitespaces)
                  }
                  let entry = LogEntry(timestamp: Date(), message: message, level: level, source: source)
                  DispatchQueue.main.async {
                      self.logs.insert(entry, at: 0)
                      if self.logs.count > self.maxLogEntries { self.logs.removeLast() }
                      self.saveLogs()
                  }
              }
              
              func clearLogs() {
                  logs.removeAll()
                  saveLogs()
              }
              
              func exportLogs() -> URL? {
                  let encoder = JSONEncoder()
                  encoder.outputFormatting = .prettyPrinted
                  encoder.dateEncodingStrategy = .iso8601
                  do {
                      let data = try encoder.encode(logs)
                      let exportURL = FileManager.default.temporaryDirectory.appendingPathComponent("xzx_logs_\(Date().timeIntervalSince1970).json")
                      try data.write(to: exportURL)
                      return exportURL
                  } catch {
                      return nil
                  }
              }
              
              private func saveLogs() {
                  let encoder = JSONEncoder()
                  encoder.dateEncodingStrategy = .iso8601
                  do {
                      let data = try encoder.encode(logs)
                      try data.write(to: logFileURL)
                  } catch {}
              }
              
              private func loadLogs() {
                  guard FileManager.default.fileExists(atPath: logFileURL.path) else { return }
                  let decoder = JSONDecoder()
                  decoder.dateDecodingStrategy = .iso8601
                  do {
                      let data = try Data(contentsOf: logFileURL)
                      logs = try decoder.decode([LogEntry].self, from: data)
                  } catch {}
              }
              
              var filteredLogs: [LogEntry] {
                  logs.filter { log in
                      selectedLevels.contains(log.level) && (searchText.isEmpty || log.message.localizedCaseInsensitiveContains(searchText))
                  }
              }
          }
          EOF

      - name: Create NotificationManager.swift
        run: |
          cat > XZX-LogViewer/Managers/NotificationManager.swift << 'EOF'
          import Foundation
          import UserNotifications
          import UIKit

          class NotificationManager: NSObject, UNUserNotificationCenterDelegate {
              static let shared = NotificationManager()
              private override init() { super.init() }
              
              func requestAuthorization() {
                  UNUserNotificationCenter.current().requestAuthorization(options: [.alert, .badge, .sound]) { granted, error in
                      if granted {
                          DispatchQueue.main.async {
                              UIApplication.shared.registerForRemoteNotifications()
                          }
                      }
                  }
                  UNUserNotificationCenter.current().delegate = self
              }
              
              func userNotificationCenter(_ center: UNUserNotificationCenter, willPresent notification: UNNotification, withCompletionHandler completionHandler: @escaping (UNNotificationPresentationOptions) -> Void) {
                  completionHandler([.banner, .sound])
              }
          }
          EOF

      - name: Create LogConsoleView.swift
        run: |
          cat > XZX-LogViewer/Views/LogConsoleView.swift << 'EOF'
          import SwiftUI

          struct LogConsoleView: View {
              @StateObject private var logManager = LogManager.shared
              @State private var showingFilter = false
              @State private var showingSettings = false
              @State private var exportURL: URL?
              @State private var showingExporter = false
              
              var body: some View {
                  NavigationView {
                      VStack(spacing: 0) {
                          HStack {
                              Text("XZX Log Console").font(.title2).fontWeight(.bold)
                              Spacer()
                              Button(action: { showingFilter.toggle() }) {
                                  Image(systemName: "line.3.horizontal.decrease.circle").font(.title2)
                              }
                              Button(action: { showingSettings.toggle() }) {
                                  Image(systemName: "gear").font(.title2)
                              }
                          }
                          .padding()
                          .background(Color(.systemBackground))
                          
                          HStack {
                              Image(systemName: "magnifyingglass").foregroundColor(.secondary)
                              TextField("Search logs...", text: $logManager.searchText)
                                  .textFieldStyle(RoundedBorderTextFieldStyle())
                          }
                          .padding(.horizontal)
                          .padding(.bottom, 8)
                          
                          if showingFilter {
                              ScrollView(.horizontal, showsIndicators: false) {
                                  HStack(spacing: 8) {
                                      FilterChip(title: "INFO", level: .info, isSelected: logManager.selectedLevels.contains(.info)) {
                                          toggleLevel(.info)
                                      }
                                      FilterChip(title: "WARNING", level: .warning, isSelected: logManager.selectedLevels.contains(.warning)) {
                                          toggleLevel(.warning)
                                      }
                                      FilterChip(title: "ERROR", level: .error, isSelected: logManager.selectedLevels.contains(.error)) {
                                          toggleLevel(.error)
                                      }
                                      FilterChip(title: "DEBUG", level: .debug, isSelected: logManager.selectedLevels.contains(.debug)) {
                                          toggleLevel(.debug)
                                      }
                                  }
                                  .padding(.horizontal)
                              }
                              .padding(.bottom, 8)
                          }
                          
                          ScrollView {
                              LazyVStack(spacing: 8) {
                                  ForEach(logManager.filteredLogs) { log in
                                      LogEntryView(entry: log)
                                  }
                              }
                              .padding()
                          }
                      }
                      .background(Color(.systemGroupedBackground))
                      .sheet(isPresented: $showingSettings) {
                          SettingsView()
                      }
                      .toolbar {
                          ToolbarItem(placement: .navigationBarTrailing) {
                              Menu {
                                  Button(action: { logManager.clearLogs() }) {
                                      Label("Clear Logs", systemImage: "trash")
                                  }
                                  Button(action: exportLogs) {
                                      Label("Export Logs", systemImage: "square.and.arrow.up")
                                  }
                                  Button(action: {
                                      if logManager.isMonitoring {
                                          logManager.stopMonitoring()
                                      } else {
                                          logManager.startMonitoring()
                                      }
                                  }) {
                                      Label(logManager.isMonitoring ? "Stop Monitoring" : "Start Monitoring",
                                            systemImage: logManager.isMonitoring ? "pause.circle" : "play.circle")
                                  }
                              } label: {
                                  Image(systemName: "ellipsis.circle").font(.title2)
                              }
                          }
                      }
                      .fileExporter(isPresented: $showingExporter, document: LogDocument(url: exportURL), contentType: .json, defaultFilename: "xzx_logs") { _ in }
                      .onAppear { logManager.startMonitoring() }
                      .onDisappear { logManager.stopMonitoring() }
                  }
              }
              
              private func toggleLevel(_ level: LogEntry.LogLevel) {
                  if logManager.selectedLevels.contains(level) {
                      logManager.selectedLevels.remove(level)
                  } else {
                      logManager.selectedLevels.insert(level)
                  }
              }
              
              private func exportLogs() {
                  exportURL = logManager.exportLogs()
                  showingExporter = true
              }
          }

          struct FilterChip: View {
              let title: String
              let level: LogEntry.LogLevel
              let isSelected: Bool
              let action: () -> Void
              
              var body: some View {
                  Button(action: action) {
                      Text(title)
                          .font(.caption)
                          .fontWeight(.medium)
                          .padding(.horizontal, 12)
                          .padding(.vertical, 6)
                          .background(isSelected ? level.color : Color(.systemGray5))
                          .foregroundColor(isSelected ? .white : .primary)
                          .cornerRadius(15)
                  }
              }
          }

          struct LogEntryView: View {
              let entry: LogEntry
              
              var body: some View {
                  HStack(alignment: .top, spacing: 12) {
                      Circle().fill(entry.level.color).frame(width: 8, height: 8).padding(.top, 6)
                      VStack(alignment: .leading, spacing: 4) {
                          HStack {
                              Text(entry.level.rawValue).font(.caption).fontWeight(.bold).foregroundColor(entry.level.color)
                              Text(formatTime(entry.timestamp)).font(.caption2).foregroundColor(.secondary)
                              Spacer()
                              Text(entry.source).font(.caption2).foregroundColor(.secondary)
                                  .padding(.horizontal, 6).padding(.vertical, 2)
                                  .background(Color(.systemGray5)).cornerRadius(4)
                          }
                          Text(entry.message).font(.system(.body, design: .monospaced)).foregroundColor(.primary)
                      }
                  }
                  .padding()
                  .background(Color(.systemBackground))
                  .cornerRadius(10)
                  .shadow(color: Color.black.opacity(0.05), radius: 2, x: 0, y: 1)
              }
              
              private func formatTime(_ date: Date) -> String {
                  let formatter = DateFormatter()
                  formatter.timeStyle = .medium
                  return formatter.string(from: date)
              }
          }

          struct LogDocument: FileDocument {
              static var readableContentTypes: [UTType] { [.json] }
              let url: URL?
              init(url: URL?) { self.url = url }
              init(configuration: ReadConfiguration) throws { url = nil }
              func fileWrapper(configuration: WriteConfiguration) throws -> FileWrapper {
                  guard let url = url, let data = try? Data(contentsOf: url) else {
                      return FileWrapper(regularFileWithContents: Data())
                  }
                  return FileWrapper(regularFileWithContents: data)
              }
          }
          EOF

      - name: Create LogDetailView.swift
        run: |
          cat > XZX-LogViewer/Views/LogDetailView.swift << 'EOF'
          import SwiftUI

          struct LogDetailView: View {
              let entry: LogEntry
              @Environment(\.dismiss) private var dismiss
              
              var body: some View {
                  NavigationView {
                      ScrollView {
                          VStack(alignment: .leading, spacing: 20) {
                              VStack(alignment: .leading, spacing: 8) {
                                  HStack {
                                      Text(entry.level.rawValue).font(.title3).fontWeight(.bold).foregroundColor(entry.level.color)
                                      Spacer()
                                      Text(formatDateTime(entry.timestamp)).font(.caption).foregroundColor(.secondary)
                                  }
                                  Divider()
                              }
                              VStack(alignment: .leading, spacing: 8) {
                                  Text("Message").font(.headline)
                                  Text(entry.message).font(.system(.body, design: .monospaced))
                                      .padding().background(Color(.systemGray6)).cornerRadius(8)
                              }
                              VStack(alignment: .leading, spacing: 8) {
                                  Text("Metadata").font(.headline)
                                  HStack { Text("Source:").foregroundColor(.secondary); Text(entry.source).fontWeight(.medium) }.font(.subheadline)
                                  HStack { Text("ID:").foregroundColor(.secondary); Text(entry.id.uuidString).font(.caption).foregroundColor(.secondary) }.font(.subheadline)
                              }
                              Spacer()
                          }
                          .padding()
                      }
                      .navigationTitle("Log Details")
                      .navigationBarTitleDisplayMode(.inline)
                      .toolbar {
                          ToolbarItem(placement: .navigationBarTrailing) {
                              Button("Done") { dismiss() }
                          }
                      }
                  }
              }
              
              private func formatDateTime(_ date: Date) -> String {
                  let formatter = DateFormatter()
                  formatter.dateStyle = .medium
                  formatter.timeStyle = .medium
                  return formatter.string(from: date)
              }
          }
          EOF

      - name: Create SettingsView.swift
        run: |
          cat > XZX-LogViewer/Views/SettingsView.swift << 'EOF'
          import SwiftUI

          struct SettingsView: View {
              @AppStorage("autoScroll") private var autoScroll = true
              @AppStorage("maxLogEntries") private var maxLogEntries = 1000
              @AppStorage("notificationEnabled") private var notificationEnabled = true
              @AppStorage("darkMode") private var darkMode = false
              @Environment(\.dismiss) private var dismiss
              
              var body: some View {
                  NavigationView {
                      Form {
                          Section(header: Text("Display")) {
                              Toggle("Auto‑scroll to new logs", isOn: $autoScroll)
                              Toggle("Dark Mode", isOn: $darkMode)
                                  .onChange(of: darkMode) { newValue in
                                      if let windowScene = UIApplication.shared.connectedScenes.first as? UIWindowScene {
                                          windowScene.windows.forEach { $0.overrideUserInterfaceStyle = newValue ? .dark : .light }
                                      }
                                  }
                              Picker("Max Log Entries", selection: $maxLogEntries) {
                                  Text("500").tag(500)
                                  Text("1000").tag(1000)
                                  Text("2000").tag(2000)
                                  Text("5000").tag(5000)
                              }
                          }
                          Section(header: Text("Notifications")) {
                              Toggle("Enable Notifications", isOn: $notificationEnabled)
                              if notificationEnabled {
                                  Button("Request Permission") {
                                      NotificationManager.shared.requestAuthorization()
                                  }
                              }
                          }
                          Section(header: Text("About")) {
                              HStack { Text("Version"); Spacer(); Text("1.0.0").foregroundColor(.secondary) }
                              HStack { Text("Build"); Spacer(); Text("1").foregroundColor(.secondary) }
                          }
                      }
                      .navigationTitle("Settings")
                      .navigationBarTitleDisplayMode(.inline)
                      .toolbar {
                          ToolbarItem(placement: .navigationBarTrailing) {
                              Button("Done") { dismiss() }
                          }
                      }
                  }
              }
          }
          EOF

      - name: Create LaunchScreen.storyboard (minimal)
        run: |
          cat > XZX-LogViewer/LaunchScreen.storyboard << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="22505" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="22505"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
