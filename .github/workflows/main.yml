                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="1cG-W7-e2g"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="bKJ-6a-4dg"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="width" secondItem="Ze5-6b-2t3" secondAttribute="width" id="g6a-f1-veQ"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="height" secondItem="Ze5-6b-2t3" secondAttribute="height" id="i7Z-n7-0fH"/>
